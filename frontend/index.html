<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jazz Café & Jam Session</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">Jazz Café</a>
            <div class="navbar-nav">
                <a class="nav-link" href="#shows">Shows</a>
                <a class="nav-link" href="#contacto">Contacto</a>
            </div>
        </div>
    </nav>

<div id="carouselExample" class="carousel slide" data-bs-ride="carousel" style="max-width: 600px; margin: auto;">
  
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="img/imagen1.jpg" class="d-block w-100" alt="Jazz 1">
    </div>
    <div class="carousel-item">
      <img src="img/imagen2.jpg" class="d-block w-100" alt="Jazz 2">
    </div>
    <div class="carousel-item">
      <img src="img/imagen3.jpg" class="d-block w-100" alt="Jazz 3">
    </div>
    <div class="carousel-item">
      <img src="img/imagen4.jpg" class="d-block w-100" alt="Jazz 4">
    </div>
  </div>

  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>

    <div class="container my-5">
        <section id="shows" class="mb-5">
            <h2 class="text-center mb-4">Cartelera</h2>
            <div class="row">
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Noche de Saxo</h5>
                            <p class="card-text">Viernes 20:00h</p>
                        </div>
                    </div>
                </div>
                </div>
        </section>

        <section class="mb-5">
            <div class="accordion" id="faqAccordion">
                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#q1">¿Cómo participar?</button>
                    </h2>
                    <div id="q1" class="accordion-collapse collapse show" data-bs-parent="#faqAccordion">
                        <div class="accordion-body">Rellena el formulario de contacto indicando 'Músico'.</div>
                    </div>
                </div>
            </div>
        </section>

        <section id="contacto">
            <h2>Reserva tu espacio</h2>
            <form id="contactForm" onsubmit="enviarFormulario(event)">
                <div class="mb-3">
                    <input type="text" class="form-control" id="nombre" placeholder="Nombre" required>
                </div>
                <div class="mb-3">
                    <input type="email" class="form-control" id="email" placeholder="Email" required>
                </div>
                <div class="mb-3">
                    <textarea class="form-control" id="mensaje" placeholder="Mensaje" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Enviar</button>
            </form>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts/script.js"></script>
</body>
</html>
